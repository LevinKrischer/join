<ui-modal-wrapper
  id="login-form"
  [contentPadding]="false"
  [showCloseButton]="false"
  modalSize="medium"
>
  <div
    class="modal-inner d-flex flex-column h-100 justify-content-center align-items-center"
    id="login-modal"
  >
    <div class="card shadow-sm p-4 w-100">
      <h3 class="my-4 text-center">Log in</h3>
      <div class="blue-divider"></div>

      <form (ngSubmit)="submit()" class="d-flex flex-column">
        <app-input-field
          class="mb-3"
          type="email"
          label="Email"
          placeholder="Email"
          icon="assets/icons/form-mail-24px.svg"
          [(model)]="form.email"
          [error]="errors.email"
          (blur)="markDirty('email')"
          (input)="liveValidate('email')"
          [maxlength]="35"
          [displayLabel]="false"
          [reserveErrorSpace]="true"
        />

        <app-input-field
          class="mb-3"
          type="password"
          label="Password"
          placeholder="Password"
          icon="assets/icons/form-lock-24px.svg"
          [(model)]="form.password"
          [error]="errors.password"
          (blur)="markDirty('password')"
          (input)="liveValidate('password')"
          [displayLabel]="false"
          [reserveErrorSpace]="true"
        />

        <div class="d-flex gap-4 mt-2 justify-content-center justify-content-lg-center">
          <ui-button type="submit" variant="primary" [disabled]="!isFormValid()" (click)="submit()">
            Log in
          </ui-button>

          <ui-button
            type="button"
            variant="secondary"
            class="d-none d-lg-inline-flex"
            (click)="guestLogin()"
          >
            Guest Log in
          </ui-button>
        </div>
        <div class="text-danger fw-bold mt-2">
          @if (errorMessage()) {
            {{ errorMessage() }}
          }
        </div>
      </form>
    </div>
  </div>
</ui-modal-wrapper>
