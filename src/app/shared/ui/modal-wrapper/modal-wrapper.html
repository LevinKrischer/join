<div class="modal-backdrop" (click)="onClose()"></div>

<div class="modal-container fadeInFromBottom" [ngClass]="'size-' + modalSize()">
  <div class="modal-content" [class.with-padding]="contentPadding()">
    @if (showCloseButton()) {
    <button type="button" class="btn-close close-btn" (click)="onClose()"></button>
    }
    <ng-content> </ng-content>
  </div>
</div>
